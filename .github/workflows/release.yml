name: Generate Release Notes

on:
  push:
    branches:
      - main
permissions: 
  contents: write
  pull-requests: write
  
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple
